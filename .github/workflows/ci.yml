name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-ios:
    name: E2E iOS (Detox)
    # iOS requiere macOS para correr el Simulator. Usamos `macos-14`
    # (Apple Silicon, runners más rápidos) en vez de macos-latest para
    # fijar la versión y evitar sorpresas al actualizar GitHub.
    runs-on: macos-14
    needs: lint
    timeout-minutes: 60
    env:
      # Detox requiere que el Simulator esté booted antes de los tests.
      # Cambia el dispositivo aquí si tu .detoxrc apunta a otro.
      SIMULATOR_DEVICE: iPhone 16 Pro
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Ruby (CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install npm dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios
        run: |
          gem install cocoapods --no-document
          LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8 pod install --repo-update

      - name: Install applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Update Detox config to match runner simulator
        # El AVD/device del .detoxrc local puede no existir en el runner.
        # Re-escribimos sólo la línea del `type:` del simulator para usar
        # el dispositivo de la env var.
        run: |
          sed -i.bak "s/type: 'iPhone [^']*'/type: '${SIMULATOR_DEVICE}'/" .detoxrc.js
          cat .detoxrc.js | grep -A1 simulator

      - name: Boot iOS Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices "${SIMULATOR_DEVICE}" available -j | \
            jq -r '.devices | to_entries[] | .value[] | select(.name=="'"${SIMULATOR_DEVICE}"'") | .udid' | head -1)
          echo "Booting $SIMULATOR_DEVICE ($DEVICE_ID)"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Build app for Detox
        run: npm run e2e:build:ios

      - name: Start Metro bundler
        run: |
          npm start > metro.log 2>&1 &
          echo $! > metro.pid
          # Esperar a que Metro responda en 8081
          for i in {1..30}; do
            curl -sf http://localhost:8081/status > /dev/null && break || sleep 2
          done

      - name: Run Detox E2E tests
        run: npm run e2e:test:ios -- --headless --record-logs all

      - name: Stop Metro
        if: always()
        run: |
          if [ -f metro.pid ]; then
            kill $(cat metro.pid) || true
          fi

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-ios
          path: |
            artifacts/
            metro.log
          retention-days: 7

  e2e-android:
    name: E2E Android (Detox)
    # Linux con KVM habilitado para acelerar el emulador. Usamos el runner
    # ubuntu-latest porque GitHub-hosted ya expone KVM (/dev/kvm) y tiene
    # Android SDK preinstalado.
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    env:
      # AVD que la job crea con android-emulator-runner. Debe coincidir con
      # `.detoxrc.js > devices.emulator.avdName`.
      AVD_NAME: Pixel_7_API_34
      EMULATOR_API: '34'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install npm dependencies
        run: npm ci

      - name: Enable KVM (acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache AVD
        # Cachea el snapshot del AVD para que el primer arranque (que tarda
        # 2-3 min) sólo ocurra cuando cambia la versión del emulador.
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.EMULATOR_API }}-${{ env.AVD_NAME }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          avd-name: ${{ env.AVD_NAME }}
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot created"

      - name: Build app + androidTest APK
        run: npm run e2e:build:android

      - name: Run Detox E2E (boot emulator + run tests + tear down)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          avd-name: ${{ env.AVD_NAME }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Metro en background
            npm start > metro.log 2>&1 &
            METRO_PID=$!
            for i in {1..30}; do
              curl -sf http://localhost:8081/status > /dev/null && break || sleep 2
            done

            # Detox abre la app, reverse-tunnels el puerto y corre los tests
            npm run e2e:test:android -- --headless --record-logs all

            kill $METRO_PID || true

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android
          path: |
            artifacts/
            metro.log
          retention-days: 7
